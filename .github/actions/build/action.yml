name: "Build"
description: "Builds a nrf-connect sample for b-parasite"
inputs:
  sample:
    description: "Sample name (blinky, input, ble, soil-read-loop, zigbee)"
    required: true
  soc:
    description: "SoC to use"
    default: nrf52840
  revision:
    description: "Board revision to use"
    default: "2.0.0"
  cmake-extra:
    description: "Extra CMake arguments"
    default: ""
  output-bin:
    description: "Output binary filename for the artifact"
    default: ""
runs:
  using: "composite"
  steps:
    - name: Build
      shell: bash
      env:
        CMAKE_EXTRA: ${{ inputs.cmake-extra }}
      run: code/scripts/build.sh "${{ inputs.sample }}" "${{ inputs.soc }}" "${{ inputs.revision }}"
    - name: Upload artifact
      if: inputs.output-bin != ''
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.output-bin }}
        path: code/samples/${{ inputs.sample }}/build_${{ inputs.soc }}_${{ inputs.revision }}/merged.hex
        if-no-files-found: error
        retention-days: 30
