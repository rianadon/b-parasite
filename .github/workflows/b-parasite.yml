name: firmware build
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-22.04
    name: Check code format
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check clang-format
        uses: jidicula/clang-format-action@v4.9.0
        with:
          check-path: "code"
          exclude-regex: '\/build\/'

  # The shipped firmware: every combination of sample x reporting cadence x
  # regulated VDD, for the nrf52840 @ 2.0.0ry1 board. 2 x 3 x 2 = 12 UF2s,
  # flashed by dropping them on the Adafruit bootloader's USB volume.
  build:
    strategy:
      fail-fast: false
      matrix:
        sample: [ble, zigbee]
        interval: [1min, 10min, 60min]
        regout0: [2V1, 2V4]
    runs-on: ubuntu-22.04
    container: ghcr.io/zephyrproject-rtos/ci:v0.28.8
    env:
      CMAKE_PREFIX_PATH: /opt/toolchains
    name: Build ${{ matrix.sample }} ${{ matrix.regout0 }} ${{ matrix.interval }}
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Compose build flags
        id: flags
        shell: bash
        env:
          SAMPLE: ${{ matrix.sample }}
          INTERVAL: ${{ matrix.interval }}
          REGOUT0: ${{ matrix.regout0 }}
        run: |
          set -euo pipefail
          case "$INTERVAL" in
            1min)  secs=60 ;;
            10min) secs=600 ;;
            60min) secs=3600 ;;
            *) echo "unhandled interval: $INTERVAL" >&2; exit 1 ;;
          esac

          if [ "$SAMPLE" = "ble" ]; then
            cadence="-DCONFIG_PRST_BLE_ENCODING_BTHOME_V2=y -DCONFIG_PRST_SLEEP_DURATION_MSEC=$((secs * 1000))"
          else
            # The parent poll interval tracks the sleep duration: polling every
            # 10 s (the Kconfig default) keeps the radio awake often enough to
            # erase the savings of the longer cadences. The tradeoff is that
            # downlink commands from the coordinator queue for up to one poll
            # interval.
            cadence="-DCONFIG_PRST_ZB_SLEEP_DURATION_SEC=$secs -DCONFIG_PRST_ZB_PARENT_POLL_INTERVAL_SEC=$secs"
          fi

          echo "cmake_extra=-DCONFIG_PRSTLIB_LOG_LEVEL_DBG=n $cadence" >> "$GITHUB_OUTPUT"
          echo "name=${SAMPLE}_nrf52840_2.0.0ry1_${REGOUT0,,}_${INTERVAL}" >> "$GITHUB_OUTPUT"
      - name: Build
        uses: ./.github/actions/build
        with:
          sample: ${{ matrix.sample }}
          soc: nrf52840
          revision: 2.0.0ry1
          uf2: "true"
          regout0: ${{ matrix.regout0 }}
          cmake-extra: ${{ steps.flags.outputs.cmake_extra }}
          output-bin: ${{ steps.flags.outputs.name }}.uf2
          artifact-name: release-${{ steps.flags.outputs.name }}

  # Bring-up firmware: USB CDC console, verbose logs, ~5 s loop. Not a battery
  # build — it's what you flash to read raw ADC values during calibration. It
  # varies only over REGOUT0 (the raw ADC endpoints you're there to measure
  # shift with VDD); ble only, and the sleep cadence comes from the dev snippet
  # rather than the interval axis.
  build-ble-dev:
    strategy:
      fail-fast: false
      matrix:
        regout0: [2V1, 2V4]
    runs-on: ubuntu-22.04
    container: ghcr.io/zephyrproject-rtos/ci:v0.28.8
    env:
      CMAKE_PREFIX_PATH: /opt/toolchains
    name: Build ble dev ${{ matrix.regout0 }}
    needs:
      - lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Resolve artifact name
        id: flags
        shell: bash
        env:
          REGOUT0: ${{ matrix.regout0 }}
        run: echo "name=ble_nrf52840_2.0.0ry1_${REGOUT0,,}_dev" >> "$GITHUB_OUTPUT"
      - name: Build
        uses: ./.github/actions/build
        with:
          sample: ble
          soc: nrf52840
          revision: 2.0.0ry1
          uf2: "true"
          dev: "true"
          regout0: ${{ matrix.regout0 }}
          cmake-extra: -DCONFIG_PRST_BLE_ENCODING_BTHOME_V2=y
          output-bin: ${{ steps.flags.outputs.name }}.uf2
          artifact-name: release-${{ steps.flags.outputs.name }}

  # Roll the "latest" release forward on every build of main, so the release
  # always reflects the tip of the branch. Pull requests build but don't publish.
  publish:
    name: Publish Latest Firmware
    needs:
      - build
      - build-ble-dev
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true
      - name: Generate SHA256 checksums
        working-directory: artifacts
        run: sha256sum *.uf2 > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          name: Latest Firmware
          tag_name: latest
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/*.uf2
            artifacts/SHA256SUMS.txt
