# Development overlay for the ble sample.
#
# Applied on top of prj.conf by `scripts/build.sh ble … --dev`.
# Wires up USB CDC ACM as the console so you can watch the per-sensor
# debug log over the same USB connection that flashed the board, and
# shrinks the wake cadence so `prst` advertises every few seconds for
# easy scanning. Not appropriate for battery deployment — the USB stack
# and the tight loop wreck battery life.

# USB CDC ACM console (paired with dev.overlay).
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="b-parasite ble (dev)"
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Wake every ~6 s — sensor read + 1 s adv + 5 s sleep. Easy to scan in
# nRF Connect, slow enough that battery life is still measured in days
# if you actually power from a cell.
CONFIG_PRST_SLEEP_DURATION_MSEC=5000
CONFIG_PRST_BLE_ADV_DURATION_MSEC=1000

# Per-sensor DBG lines from prstlib.
CONFIG_PRSTLIB_LOG_LEVEL_DBG=y
