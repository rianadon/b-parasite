# Development overlay for the zigbee sample.
#
# Applied on top of prj.conf by `scripts/build.sh zigbee … --dev`.
# Replaces SEGGER RTT (requires a J-Link) with USB CDC ACM so the host
# sees debug logs over the same USB cable used to flash the board, and
# shrinks the sleep duration for faster bench iteration. Not for battery
# deployment — USB stack + 10 s sleep destroy CR2032 life.

# USB CDC ACM console (paired with dev.overlay).
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="b-parasite zigbee (dev)"
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Don't waste RAM/cycles on RTT when we have USB CDC.
CONFIG_USE_SEGGER_RTT=n

# 10 s between sensor reads — fast enough to see updates land in the
# coordinator without rebooting the board every minute.
CONFIG_PRST_ZB_SLEEP_DURATION_SEC=10

# Verbose logs from prstlib + Zephyr defaults.
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_PRSTLIB_LOG_LEVEL_DBG=y
