# Shared bring-up overlay for b-parasite samples.
#
# Applied by `scripts/build.sh <sample> ... --dev`. Replaces the production
# logging path with a USB CDC ACM virtual UART so the host sees per-sensor
# debug logs over the flashing USB cable, enables verbose log output, and
# shrinks the sleep cadence for fast bench iteration. Not for battery
# deployment — USB stack costs RAM and burns power.

# USB CDC ACM console (paired with dev.overlay).
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="b-parasite (dev)"
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Verbose logs from prstlib + Zephyr defaults.
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_PRSTLIB_LOG_LEVEL_DBG=y

# Shrunk sleep cadence — each sample's sleep-duration Kconfig picks a
# bench-friendly default when this is on (ble: 5 s, zigbee: 10 s).
# Defined in prstlib/Kconfig.
CONFIG_PRSTLIB_DEV_FAST_LOOP=y
